<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Assamese Calendar</title>
  <!-- Fonts matching original app -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@100..900&family=Tiro+Bangla:ital@0;1&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
  <!-- App Layout Wrapper -->
  <div class="app-wrapper">
    <!-- Left Navigation Sidebar -->
    <aside class="left-nav">
      <a href="../" style="text-decoration: none; display: block; color: inherit; outline: none;">
        <div class="brand">
          <div class="logo-icon">
            <img src="../assets/images/favicon.svg" alt="App Logo"
              style="width: 60%; height: 60%; object-fit: contain;" />
          </div>
          <div class="brand-text">
            <span class="brand-title" data-i18n="app.title_pt1">অসমীয়া</span>
            <span class="brand-subtitle" data-i18n="app.title_pt2">কেলেণ্ডাৰ</span>
          </div>
        </div>
      </a>

      <div class="nav-menu">
        <div class="nav-label" data-i18n="nav.menu">MENU</div>
        <a href="../" class="nav-item w-full">
          <i data-lucide="home" class="w-5 h-5"></i>
          <span>Home</span>
        </a>
        <a href="../calendar/" class="nav-item active w-full">
          <i data-lucide="calendar" class="w-5 h-5"></i>
          <span data-i18n="nav.calendar">কেলেণ্ডাৰ</span>
        </a>
        <a href="../translator/" class="nav-item w-full">
          <i data-lucide="languages" class="w-5 h-5"></i>
          <span data-i18n="nav.translator">Assamese Translator</span>
        </a>
      </div>

      <div class="nav-footer">
        <button id="theme-toggle-btn" class="icon-button" title="Toggle Dark/Light Mode">
          <i data-lucide="moon" class="w-5 h-5 theme-icon-moon"></i>
          <i data-lucide="sun" class="w-5 h-5 theme-icon-sun hidden"></i>
        </button>
        <button id="lang-toggle-btn" class="lang-toggle flex items-center gap-1 cursor-pointer" title="Toggle Language">
          <i data-lucide="languages" class="w-4 h-4"></i>
          <span id="lang-text" class="text-sm font-semibold">EN</span>
        </button>
      </div>
    </aside>

    <!-- Main Content Scroll Area -->
    <div class="content-scroll">
      <!-- Main Dashboard Application Wrapper -->
      <div class="dashboard-layout">
        <!-- Main Content Area -->
        <div class="main-content">
          <!-- Dashboard Header block removed based on request -->
          <!-- Today Info Card -->
          <div class="today-card fade-in zoom-in group">
            <div class="today-card-bg"></div>
            <div class="today-card-content">
              <div class="flex items-center gap-4 z-10 w-full">
                <div class="today-card-icon group-hover-scale" id="today-day-number">
                  --
                </div>
                <div class="flex-1">
                  <h2 class="today-card-title text-foreground" id="today-full-date">...</h2>
                  <div class="flex items-center gap-2 mt-1">
                    <i data-lucide="calendar-days" class="w-4 h-4 text-primary opacity-[0.8]"></i>
                    <p class="today-card-subtitle" id="today-assamese-date">...</p>
                  </div>
                </div>
              </div>
              <div class="today-card-badge shadow-sm text-center" id="today-weekday" style="font-size: 20px; font-weight: 700; padding: 0.25rem 1rem;">...</div>
            </div>
          </div>

          <!-- Separate Today Festival Card -->
          <div class="card p-5 fade-in zoom-in group" id="today-festival-wrapper" style="display: none; border: 1px solid rgba(245, 158, 11, 0.3); background: linear-gradient(135deg, rgba(245, 158, 11, 0.05) 0%, rgba(245, 158, 11, 0.01) 100%); margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(245, 158, 11, 0.06);">
            <div class="flex flex-col sm:flex-row items-center sm:items-start gap-4">
              <div class="flex items-center justify-center flex-shrink-0" style="background: rgba(245, 158, 11, 0.12); padding: 0.75rem; border-radius: 12px; box-shadow: inset 0 0 10px rgba(245, 158, 11, 0.1);">
                <i data-lucide="sparkles" class="w-6 h-6" style="color: #f59e0b;"></i>
              </div>
              <div class="flex flex-col text-center sm:text-left pt-1">
                <span style="font-size: 0.95rem; font-weight: 800; color: #f59e0b; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.25rem;">আজিৰ বিশেষ দিন</span>
                <span id="Sig" style="font-family: 'Tiro Bangla', serif; font-size: 1.4rem; color: var(--foreground); font-weight: 800; line-height: 1.3;"></span>
              </div>
            </div>
          </div>

          <!-- Calendar Grid Area -->
          <div class="calendar-container">
            <div class="card calendar-card fade-in zoom-in">
              <!-- Calendar Header Navigation -->
              <div class="calendar-nav">
                <div class="calendar-nav-title">
                  <h2 id="calendar-title" class="calendar-title">Month Name</h2>
                  <span id="calendar-subtitle" class="calendar-subtitle hidden sm:inline-block">Sub Name</span>
                </div>
                <div class="calendar-nav-actions">
                  <button id="btn-today" class="btn btn-outline btn-sm sm-flex hidden"
                    data-i18n="btn.today">Today</button>
                  <div class="month-nav-group">
                    <button id="btn-prev-month" class="icon-button mini-btn">
                      <i data-lucide="chevron-left" class="w-4 h-4"></i>
                    </button>
                    <div class="divider-vertical"></div>
                    <button id="btn-next-month" class="icon-button mini-btn">
                      <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    </button>
                  </div>
                </div>
              </div>

              <!-- Weekdays Header -->
              <div id="weekdays-grid" class="weekdays-grid">
                <!-- Dynamically populated via JS -->
              </div>

              <!-- Calendar Days Grid -->
              <div id="days-grid" class="days-grid">
                <!-- Dynamically populated via JS -->
              </div>
            </div>
          </div>
        </div>

        <!-- Right Sidebar Area -->
        <div class="sidebar">
          <!-- Upcoming Events Card -->
          <div class="card p-5">
            <div class="flex items-center gap-2" style="margin-bottom: 1.5rem;">
              <i data-lucide="bell" class="w-5 h-5 text-foreground"></i>
              <h3 class="font-display font-bold text-lg" data-i18n="lbl.upcoming">Upcoming</h3>
            </div>
            <div class="scroll-area" id="upcoming-events-container">
              <!-- Dynamically populated via JS -->
            </div>
          </div>

          <!-- Featured Cultural Motif Card -->
          <div class="card image-card group">
            <img src="../assets/images/landing-hero.png" alt="Cultural motif" class="cover-image group-hover-scale"
              onerror="this.src='https://images.unsplash.com/photo-1548810486-455bdaef383c?auto=format&fit=crop&q=80&w=800';" />
            <div class="image-overlay">
              <h4 class="image-title" data-i18n="motif.title">অসমীয়া নৱবৰ্ষ</h4>
              <p class="image-desc" data-i18n="motif.desc">Assamese New Year approaches in Bohag</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Event Dialog / Modal -->
    <div id="event-dialog" class="dialog-overlay hidden">
      <div class="dialog-content card zoom-in shadow-xl">
        <div class="dialog-header">
          <h2 id="dialog-title" class="dialog-title text-xl" data-i18n="btn.add_event">Add Event</h2>
          <button id="dialog-close-btn" class="icon-button dialog-close" title="Close">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>

        <form id="event-form" class="space-y-4 py-4">
          <input type="hidden" id="event-id" />

          <div class="form-group">
            <label for="event-title" data-i18n="form.title">Event Title</label>
            <input type="text" id="event-title" class="input flex-1" placeholder="Event name..." required />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="form-group">
              <label for="event-date" data-i18n="form.date">Date</label>
              <div class="input-icon-wrapper">
                <i data-lucide="calendar" class="input-icon w-4 h-4"></i>
                <input type="date" id="event-date" class="input input-with-icon" required />
              </div>
            </div>
            <div class="form-group">
              <label for="event-time" data-i18n="form.time">Time</label>
              <div class="input-icon-wrapper">
                <i data-lucide="clock" class="input-icon w-4 h-4"></i>
                <input type="time" id="event-time" class="input input-with-icon" />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="event-category" data-i18n="form.category">Category</label>
            <select id="event-category" class="input">
              <option value="other">📝 Other</option>
              <option value="festival">🎉 Festival</option>
              <option value="meeting">👥 Meeting</option>
              <option value="birthday">🎂 Birthday</option>
              <option value="task">✅ Task</option>
              <option value="reminder">🔔 Reminder</option>
            </select>
          </div>

          <div class="form-group">
            <label for="event-desc" data-i18n="form.desc">Description</label>
            <textarea id="event-desc" class="input textarea" placeholder="Add details..."></textarea>
          </div>

          <div class="flex items-center gap-2 py-2">
            <label class="switch">
              <input type="checkbox" id="event-notify">
              <span class="slider round"></span>
            </label>
            <label for="event-notify" class="flex items-center gap-2 cursor-pointer font-medium text-sm">
              <i data-lucide="bell" class="w-4 h-4 text-primary"></i>
              <span data-i18n="form.notify">Enable Notifications</span>
            </label>
          </div>

          <div class="dialog-footer flex justify-between">
            <button type="button" id="btn-delete-event" class="btn btn-destructive btn-icon hover-elevate hidden">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
            <div class="flex gap-2 w-full justify-end">
              <button type="button" id="btn-cancel-event" class="btn btn-outline hover-elevate"
                data-i18n="btn.cancel">Cancel</button>
              <button type="submit" id="btn-save-event" class="btn btn-primary hover-elevate font-semibold"
                data-i18n="btn.save">Save</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container"
      class="toast-container fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script src="../assets/js/script.js"></script>
    <script src="../assets/js/today-feature.js"></script>
    <script>
      // Show festival wrapper if text is populated
      const sigElement = document.getElementById('Sig');
      const festWrapper = document.getElementById('today-festival-wrapper');
      if (sigElement && sigElement.innerHTML.trim() !== "") {
        festWrapper.style.display = 'block';
      }
    </script>
</body>

</html>
